# Run backend without Docker/PostgreSQL: in-memory H2, schema from JPA.
# Usage: ./gradlew bootRun --args='--spring.profiles.active=local'
spring:
  datasource:
    url: jdbc:h2:mem:local;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;INIT=CREATE DOMAIN IF NOT EXISTS JSONB AS TEXT
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
