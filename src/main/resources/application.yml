spring:
  application:
    name: anti-doom-scroll
  datasource:
    url: jdbc:postgresql://localhost:5432/antidoomscroll
    username: antidoomscroll
    password: antidoomscroll
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
        jdbc:
          time_zone: UTC
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  # PORT is set by Cloud Run (default 8080); use 5173 for local dev
  port: ${PORT:5173}

# MVP: allow anonymous local profile (no account)
app:
  anonymous-profile-enabled: true
  session-default-seconds: 180
  low-battery-mode-seconds: 45
  cors:
    origins: http://localhost:5173, http://localhost:5174
  # Ladder mode: score-based level progression (40% stay, 75% advance, last 5 answers)
  ladder:
    defaultCode: default
    ladders:
      default:
        name: "Default Ladder"
        thresholds:
          minScoreToStay: 0.40
          minScoreToAdvance: 0.75
          answersNeededToAdvance: 5
        levels:
          - levelIndex: 0
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [default]
          - levelIndex: 1
            allowedDifficulties: [ULTRA_EASY, EASY]
            subjectCodes: [default]
          - levelIndex: 2
            allowedDifficulties: [EASY]
            subjectCodes: [default]
          - levelIndex: 3
            allowedDifficulties: [EASY, MEDIUM]
            subjectCodes: [default]
          - levelIndex: 4
            allowedDifficulties: [MEDIUM]
            subjectCodes: [default]
      # Sum ladder: addition → subtraction → mult/div, levels 0-25
      sum:
        name: "Math Sum Ladder"
        thresholds:
          minScoreToStay: 0.40
          minScoreToAdvance: 0.75
          answersNeededToAdvance: 5
        levels:
          # 0: ultra easy sum only
          - levelIndex: 0
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [ADD]
          # 1-5: ultra easy → easy (add only)
          - levelIndex: 1
            allowedDifficulties: [ULTRA_EASY, EASY]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [ADD]
          - levelIndex: 2
            allowedDifficulties: [ULTRA_EASY, EASY]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [ADD]
          - levelIndex: 3
            allowedDifficulties: [EASY]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [ADD]
          - levelIndex: 4
            allowedDifficulties: [EASY, MEDIUM]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [ADD]
          - levelIndex: 5
            allowedDifficulties: [EASY, MEDIUM]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [ADD]
          # 6-10: add subtraction, same difficulty progression
          - levelIndex: 6
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [ADD, SUBTRACT]
          - levelIndex: 7
            allowedDifficulties: [ULTRA_EASY, EASY]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [ADD, SUBTRACT]
          - levelIndex: 8
            allowedDifficulties: [ULTRA_EASY, EASY]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [ADD, SUBTRACT]
          - levelIndex: 9
            allowedDifficulties: [EASY]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [ADD, SUBTRACT]
          - levelIndex: 10
            allowedDifficulties: [EASY, MEDIUM]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [ADD, SUBTRACT]
          # 11-15: mix until medium sum-subtraction
          - levelIndex: 11
            allowedDifficulties: [EASY, MEDIUM]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [ADD, SUBTRACT]
          - levelIndex: 12
            allowedDifficulties: [MEDIUM]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [ADD, SUBTRACT]
          - levelIndex: 13
            allowedDifficulties: [MEDIUM]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [ADD, SUBTRACT]
          - levelIndex: 14
            allowedDifficulties: [MEDIUM, HARD]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [ADD, SUBTRACT]
          - levelIndex: 15
            allowedDifficulties: [MEDIUM, HARD]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [ADD, SUBTRACT]
          # 16-20: adding multiplication/division
          - levelIndex: 16
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [ADD, SUBTRACT, MULTIPLY, DIVIDE]
          - levelIndex: 17
            allowedDifficulties: [ULTRA_EASY, EASY]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [ADD, SUBTRACT, MULTIPLY, DIVIDE]
          - levelIndex: 18
            allowedDifficulties: [EASY]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [ADD, SUBTRACT, MULTIPLY, DIVIDE]
          - levelIndex: 19
            allowedDifficulties: [EASY, MEDIUM]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [ADD, SUBTRACT, MULTIPLY, DIVIDE]
          - levelIndex: 20
            allowedDifficulties: [EASY, MEDIUM]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [ADD, SUBTRACT, MULTIPLY, DIVIDE]
          # 21-25: increasing multiplication/division
          - levelIndex: 21
            allowedDifficulties: [EASY]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [MULTIPLY, DIVIDE]
          - levelIndex: 22
            allowedDifficulties: [EASY, MEDIUM]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [MULTIPLY, DIVIDE]
          - levelIndex: 23
            allowedDifficulties: [MEDIUM]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [MULTIPLY, DIVIDE]
          - levelIndex: 24
            allowedDifficulties: [MEDIUM, HARD]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [MULTIPLY, DIVIDE]
          - levelIndex: 25
            allowedDifficulties: [HARD]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [MULTIPLY, DIVIDE]
      # Anagram ladder: 30 levels progressing through word length (2-3 → 8+ letters)
      # Phase structure: 4-level pure tiers + 2-level bridges between each phase
      # ULTRA_EASY=2-3 letters, EASY=3-4, MEDIUM=4-5, HARD=6-7, VERY_HARD=8-15
      anagram:
        name: "Anagram Ladder"
        thresholds:
          minScoreToStay: 0.40
          minScoreToAdvance: 0.75
          answersNeededToAdvance: 5
        levels:
          # Phase 1: ULTRA_EASY — 2-3 letter words (levels 0-3)
          - levelIndex: 0
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [WORD]
          - levelIndex: 1
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [WORD]
          - levelIndex: 2
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [WORD]
          - levelIndex: 3
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [WORD]
          # Bridge 1→2: ULTRA_EASY + EASY (levels 4-5)
          - levelIndex: 4
            allowedDifficulties: [ULTRA_EASY, EASY]
            subjectCodes: [WORD]
          - levelIndex: 5
            allowedDifficulties: [ULTRA_EASY, EASY]
            subjectCodes: [WORD]
          # Phase 2: EASY — 3-4 letter words (levels 6-10)
          - levelIndex: 6
            allowedDifficulties: [EASY]
            subjectCodes: [WORD]
          - levelIndex: 7
            allowedDifficulties: [EASY]
            subjectCodes: [WORD]
          - levelIndex: 8
            allowedDifficulties: [EASY]
            subjectCodes: [WORD]
          - levelIndex: 9
            allowedDifficulties: [EASY]
            subjectCodes: [WORD]
          - levelIndex: 10
            allowedDifficulties: [EASY]
            subjectCodes: [WORD]
          # Bridge 2→3: EASY + MEDIUM (levels 11-12)
          - levelIndex: 11
            allowedDifficulties: [EASY, MEDIUM]
            subjectCodes: [WORD]
          - levelIndex: 12
            allowedDifficulties: [EASY, MEDIUM]
            subjectCodes: [WORD]
          # Phase 3: MEDIUM — 4-5 letter words (levels 13-17)
          - levelIndex: 13
            allowedDifficulties: [MEDIUM]
            subjectCodes: [WORD]
          - levelIndex: 14
            allowedDifficulties: [MEDIUM]
            subjectCodes: [WORD]
          - levelIndex: 15
            allowedDifficulties: [MEDIUM]
            subjectCodes: [WORD]
          - levelIndex: 16
            allowedDifficulties: [MEDIUM]
            subjectCodes: [WORD]
          - levelIndex: 17
            allowedDifficulties: [MEDIUM]
            subjectCodes: [WORD]
          # Bridge 3→4: MEDIUM + HARD (levels 18-19)
          - levelIndex: 18
            allowedDifficulties: [MEDIUM, HARD]
            subjectCodes: [WORD]
          - levelIndex: 19
            allowedDifficulties: [MEDIUM, HARD]
            subjectCodes: [WORD]
          # Phase 4: HARD — 6-7 letter words (levels 20-24)
          - levelIndex: 20
            allowedDifficulties: [HARD]
            subjectCodes: [WORD]
          - levelIndex: 21
            allowedDifficulties: [HARD]
            subjectCodes: [WORD]
          - levelIndex: 22
            allowedDifficulties: [HARD]
            subjectCodes: [WORD]
          - levelIndex: 23
            allowedDifficulties: [HARD]
            subjectCodes: [WORD]
          - levelIndex: 24
            allowedDifficulties: [HARD]
            subjectCodes: [WORD]
          # Bridge 4→5: HARD + VERY_HARD (levels 25-26)
          - levelIndex: 25
            allowedDifficulties: [HARD, VERY_HARD]
            subjectCodes: [WORD]
          - levelIndex: 26
            allowedDifficulties: [HARD, VERY_HARD]
            subjectCodes: [WORD]
          # Phase 5: VERY_HARD — 8-15 letter words (levels 27-29)
          - levelIndex: 27
            allowedDifficulties: [VERY_HARD]
            subjectCodes: [WORD]
          - levelIndex: 28
            allowedDifficulties: [VERY_HARD]
            subjectCodes: [WORD]
          - levelIndex: 29
            allowedDifficulties: [VERY_HARD]
            subjectCodes: [WORD]
      # Pair ladder: memory card pairs (levels 0-14) then sum pairs (levels 15-29)
      # Phase 1 — MEMORY_CARD_PAIRS: 3 pairs → 4 pairs → 6 pairs, 5 levels per difficulty
      # Phase 2 — SUM_PAIR: single static → two statics → random statics → three statics
      pair:
        name: "Memory Pair Ladder"
        thresholds:
          minScoreToStay: 0.40
          minScoreToAdvance: 0.75
          answersNeededToAdvance: 5
        levels:
          # --- Phase 1: MEMORY_CARD_PAIRS ---
          # ULTRA_EASY: 3 pairs (6 cards). Simple warm-up.
          - levelIndex: 0
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [MEMORY]
            allowedTypes: [MEMORY_CARD_PAIRS]
          - levelIndex: 1
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [MEMORY]
            allowedTypes: [MEMORY_CARD_PAIRS]
          - levelIndex: 2
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [MEMORY]
            allowedTypes: [MEMORY_CARD_PAIRS]
          - levelIndex: 3
            allowedDifficulties: [ULTRA_EASY, EASY]
            subjectCodes: [MEMORY]
            allowedTypes: [MEMORY_CARD_PAIRS]
          - levelIndex: 4
            allowedDifficulties: [ULTRA_EASY, EASY]
            subjectCodes: [MEMORY]
            allowedTypes: [MEMORY_CARD_PAIRS]
          # EASY: 4 pairs (8 cards). One more pair to track.
          - levelIndex: 5
            allowedDifficulties: [EASY]
            subjectCodes: [MEMORY]
            allowedTypes: [MEMORY_CARD_PAIRS]
          - levelIndex: 6
            allowedDifficulties: [EASY]
            subjectCodes: [MEMORY]
            allowedTypes: [MEMORY_CARD_PAIRS]
          - levelIndex: 7
            allowedDifficulties: [EASY]
            subjectCodes: [MEMORY]
            allowedTypes: [MEMORY_CARD_PAIRS]
          - levelIndex: 8
            allowedDifficulties: [EASY, MEDIUM]
            subjectCodes: [MEMORY]
            allowedTypes: [MEMORY_CARD_PAIRS]
          - levelIndex: 9
            allowedDifficulties: [EASY, MEDIUM]
            subjectCodes: [MEMORY]
            allowedTypes: [MEMORY_CARD_PAIRS]
          # MEDIUM: 6 pairs (12 cards). Full memory challenge.
          - levelIndex: 10
            allowedDifficulties: [MEDIUM]
            subjectCodes: [MEMORY]
            allowedTypes: [MEMORY_CARD_PAIRS]
          - levelIndex: 11
            allowedDifficulties: [MEDIUM]
            subjectCodes: [MEMORY]
            allowedTypes: [MEMORY_CARD_PAIRS]
          - levelIndex: 12
            allowedDifficulties: [MEDIUM]
            subjectCodes: [MEMORY]
            allowedTypes: [MEMORY_CARD_PAIRS]
          - levelIndex: 13
            allowedDifficulties: [MEDIUM]
            subjectCodes: [MEMORY]
            allowedTypes: [MEMORY_CARD_PAIRS]
          - levelIndex: 14
            allowedDifficulties: [MEDIUM]
            subjectCodes: [MEMORY]
            allowedTypes: [MEMORY_CARD_PAIRS]
          # --- Phase 2: SUM_PAIR ---
          # ULTRA_EASY: static=2, 3 pairs per round, range 1-30. Arithmetic intro.
          - levelIndex: 15
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [MEMORY]
            allowedTypes: [SUM_PAIR]
          - levelIndex: 16
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [MEMORY]
            allowedTypes: [SUM_PAIR]
          - levelIndex: 17
            allowedDifficulties: [ULTRA_EASY, EASY]
            subjectCodes: [MEMORY]
            allowedTypes: [SUM_PAIR]
          # EASY: static=5, 4 pairs per round, range 1-50 or 1-2 digit numbers.
          - levelIndex: 18
            allowedDifficulties: [EASY]
            subjectCodes: [MEMORY]
            allowedTypes: [SUM_PAIR]
          - levelIndex: 19
            allowedDifficulties: [EASY]
            subjectCodes: [MEMORY]
            allowedTypes: [SUM_PAIR]
          - levelIndex: 20
            allowedDifficulties: [EASY]
            subjectCodes: [MEMORY]
            allowedTypes: [SUM_PAIR]
          - levelIndex: 21
            allowedDifficulties: [EASY, MEDIUM]
            subjectCodes: [MEMORY]
            allowedTypes: [SUM_PAIR]
          # MEDIUM: 2 statics (fixed or random), 3 pairs per round, range 1-99.
          - levelIndex: 22
            allowedDifficulties: [MEDIUM]
            subjectCodes: [MEMORY]
            allowedTypes: [SUM_PAIR]
          - levelIndex: 23
            allowedDifficulties: [MEDIUM]
            subjectCodes: [MEMORY]
            allowedTypes: [SUM_PAIR]
          - levelIndex: 24
            allowedDifficulties: [MEDIUM]
            subjectCodes: [MEMORY]
            allowedTypes: [SUM_PAIR]
          - levelIndex: 25
            allowedDifficulties: [MEDIUM, HARD]
            subjectCodes: [MEMORY]
            allowedTypes: [SUM_PAIR]
          # HARD: 3 statics [2, 5, 10], 4 pairs per round, range 1-99. Peak challenge.
          - levelIndex: 26
            allowedDifficulties: [HARD]
            subjectCodes: [MEMORY]
            allowedTypes: [SUM_PAIR]
          - levelIndex: 27
            allowedDifficulties: [HARD]
            subjectCodes: [MEMORY]
            allowedTypes: [SUM_PAIR]
          - levelIndex: 28
            allowedDifficulties: [HARD]
            subjectCodes: [MEMORY]
            allowedTypes: [SUM_PAIR]
          - levelIndex: 29
            allowedDifficulties: [HARD]
            subjectCodes: [MEMORY]
            allowedTypes: [SUM_PAIR]
      # N-Back ladder: 30 levels — cards → grid → dual n-back
      # Phase 1 (L0-L9): card N-back, n=1→3 with increasing suit count
      # Phase 2 (L10-L19): grid position N-back, n=1→3 with 3×3 and 4×4 grids
      # Phase 3 (L20-L29): dual N-back (card+grid), n=1→3
      nback:
        name: "N-Back Ladder"
        thresholds:
          minScoreToStay: 0.40
          minScoreToAdvance: 0.75
          answersNeededToAdvance: 5
        levels:
          # ── Phase 1: Card N-Back ──────────────────────────────────────────────
          - levelIndex: 0
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [B1]
            allowedTypes: [N_BACK]
            exerciseParamFilter:
              n: ["1"]
              suitCount: ["1"]
          - levelIndex: 1
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [B1]
            allowedTypes: [N_BACK]
            exerciseParamFilter:
              n: ["1"]
              suitCount: ["2"]
          - levelIndex: 2
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [B1]
            allowedTypes: [N_BACK]
            exerciseParamFilter:
              n: ["1"]
              suitCount: ["3"]
          - levelIndex: 3
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [B1]
            allowedTypes: [N_BACK]
            exerciseParamFilter:
              n: ["1"]
              suitCount: ["4"]
          - levelIndex: 4
            allowedDifficulties: [EASY]
            subjectCodes: [B1]
            allowedTypes: [N_BACK]
            exerciseParamFilter:
              n: ["2"]
              suitCount: ["1"]
          - levelIndex: 5
            allowedDifficulties: [EASY]
            subjectCodes: [B1]
            allowedTypes: [N_BACK]
            exerciseParamFilter:
              n: ["2"]
              suitCount: ["2"]
          - levelIndex: 6
            allowedDifficulties: [EASY]
            subjectCodes: [B1]
            allowedTypes: [N_BACK]
            exerciseParamFilter:
              n: ["2"]
              suitCount: ["3"]
          - levelIndex: 7
            allowedDifficulties: [EASY]
            subjectCodes: [B1]
            allowedTypes: [N_BACK]
            exerciseParamFilter:
              n: ["2"]
              suitCount: ["4"]
          - levelIndex: 8
            allowedDifficulties: [MEDIUM]
            subjectCodes: [B1]
            allowedTypes: [N_BACK]
            exerciseParamFilter:
              n: ["3"]
              suitCount: ["2"]
          - levelIndex: 9
            allowedDifficulties: [MEDIUM]
            subjectCodes: [B1]
            allowedTypes: [N_BACK]
            exerciseParamFilter:
              n: ["3"]
              suitCount: ["4"]
          # ── Phase 2: Grid Position N-Back ────────────────────────────────────
          - levelIndex: 10
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [B1]
            allowedTypes: [N_BACK_GRID]
            exerciseParamFilter:
              n: ["1"]
              gridSize: ["3"]
          - levelIndex: 11
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [B1]
            allowedTypes: [N_BACK_GRID]
            exerciseParamFilter:
              n: ["1"]
              gridSize: ["4"]
          - levelIndex: 12
            allowedDifficulties: [EASY]
            subjectCodes: [B1]
            allowedTypes: [N_BACK_GRID]
            exerciseParamFilter:
              n: ["2"]
              gridSize: ["3"]
          - levelIndex: 13
            allowedDifficulties: [EASY]
            subjectCodes: [B1]
            allowedTypes: [N_BACK_GRID]
            exerciseParamFilter:
              n: ["2"]
              gridSize: ["4"]
          - levelIndex: 14
            allowedDifficulties: [MEDIUM]
            subjectCodes: [B1]
            allowedTypes: [N_BACK_GRID]
            exerciseParamFilter:
              n: ["3"]
              gridSize: ["3"]
          - levelIndex: 15
            allowedDifficulties: [MEDIUM]
            subjectCodes: [B1]
            allowedTypes: [N_BACK_GRID]
            exerciseParamFilter:
              n: ["3"]
              gridSize: ["4"]
          - levelIndex: 16
            allowedDifficulties: [EASY, MEDIUM]
            subjectCodes: [B1]
            allowedTypes: [N_BACK_GRID]
          - levelIndex: 17
            allowedDifficulties: [MEDIUM]
            subjectCodes: [B1]
            allowedTypes: [N_BACK, N_BACK_GRID]
            exerciseParamFilter:
              n: ["3"]
          - levelIndex: 18
            allowedDifficulties: [EASY, MEDIUM]
            subjectCodes: [B1]
            allowedTypes: [N_BACK, N_BACK_GRID]
          - levelIndex: 19
            allowedDifficulties: [MEDIUM]
            subjectCodes: [B1]
            allowedTypes: [N_BACK_GRID]
            exerciseParamFilter:
              n: ["3"]
              gridSize: ["4"]
          # ── Phase 3: Dual N-Back ──────────────────────────────────────────────
          - levelIndex: 20
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [B1]
            allowedTypes: [DUAL_NBACK_CARD]
            exerciseParamFilter:
              n: ["1"]
          - levelIndex: 21
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [B1]
            allowedTypes: [DUAL_NBACK_GRID]
            exerciseParamFilter:
              n: ["1"]
          - levelIndex: 22
            allowedDifficulties: [EASY]
            subjectCodes: [B1]
            allowedTypes: [DUAL_NBACK_CARD, DUAL_NBACK_GRID]
            exerciseParamFilter:
              n: ["1"]
          - levelIndex: 23
            allowedDifficulties: [EASY]
            subjectCodes: [B1]
            allowedTypes: [DUAL_NBACK_CARD]
            exerciseParamFilter:
              n: ["2"]
          - levelIndex: 24
            allowedDifficulties: [EASY]
            subjectCodes: [B1]
            allowedTypes: [DUAL_NBACK_GRID]
            exerciseParamFilter:
              n: ["2"]
          - levelIndex: 25
            allowedDifficulties: [EASY, MEDIUM]
            subjectCodes: [B1]
            allowedTypes: [DUAL_NBACK_CARD, DUAL_NBACK_GRID]
            exerciseParamFilter:
              n: ["2"]
          - levelIndex: 26
            allowedDifficulties: [MEDIUM]
            subjectCodes: [B1]
            allowedTypes: [DUAL_NBACK_CARD]
            exerciseParamFilter:
              n: ["3"]
          - levelIndex: 27
            allowedDifficulties: [MEDIUM]
            subjectCodes: [B1]
            allowedTypes: [DUAL_NBACK_GRID]
            exerciseParamFilter:
              n: ["3"]
          - levelIndex: 28
            allowedDifficulties: [MEDIUM, HARD]
            subjectCodes: [B1]
            allowedTypes: [DUAL_NBACK_CARD, DUAL_NBACK_GRID]
            exerciseParamFilter:
              n: ["3"]
          - levelIndex: 29
            allowedDifficulties: [HARD]
            subjectCodes: [B1]
            allowedTypes: [DUAL_NBACK_CARD, DUAL_NBACK_GRID]
      # Estimation ladder: 30 levels — approximate numerical answers scored by accuracy + speed.
      # Two content dimensions: knowledge difficulty (UE→VH) and implicit speed pressure.
      # Phase structure mirrors anagram ladder: pure tiers with 2-level bridges between each.
      # UE=everyday (Eiffel, π×10), EASY=school (Everest, √200), MEDIUM=cultural (Earth→Moon, e³),
      # HARD=expert (speed of light, 7^5), VERY_HARD=specialist (seconds/year, 2^20).
      estimation:
        name: "Estimation Ladder"
        thresholds:
          minScoreToStay: 0.40
          minScoreToAdvance: 0.75
          answersNeededToAdvance: 5
        levels:
          # ── Phase 1: ULTRA_EASY — everyday knowledge (levels 0-4) ─────────────
          - levelIndex: 0
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [ESTIMATION]
          - levelIndex: 1
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [ESTIMATION]
          - levelIndex: 2
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [ESTIMATION]
          - levelIndex: 3
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [ESTIMATION]
          - levelIndex: 4
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [ESTIMATION]
          # ── Bridge 1→2: ULTRA_EASY + EASY (levels 5-6) ───────────────────────
          - levelIndex: 5
            allowedDifficulties: [ULTRA_EASY, EASY]
            subjectCodes: [ESTIMATION]
          - levelIndex: 6
            allowedDifficulties: [ULTRA_EASY, EASY]
            subjectCodes: [ESTIMATION]
          # ── Phase 2: EASY — school-level knowledge (levels 7-11) ──────────────
          - levelIndex: 7
            allowedDifficulties: [EASY]
            subjectCodes: [ESTIMATION]
          - levelIndex: 8
            allowedDifficulties: [EASY]
            subjectCodes: [ESTIMATION]
          - levelIndex: 9
            allowedDifficulties: [EASY]
            subjectCodes: [ESTIMATION]
          - levelIndex: 10
            allowedDifficulties: [EASY]
