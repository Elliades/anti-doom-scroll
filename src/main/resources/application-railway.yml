# Railway deployment: single service (backend + static frontend).
# Activate with SPRING_PROFILES_ACTIVE=railway (set in Dockerfile).
#
# DATABASE SETUP — on the anti-doom-scroll service in Railway dashboard,
# add these Variable References pointing to the Postgres plugin:
#   PGHOST       = ${{Postgres.PGHOST}}
#   PGPORT       = ${{Postgres.PGPORT}}
#   PGUSER       = ${{Postgres.PGUSER}}
#   PGPASSWORD   = ${{Postgres.PGPASSWORD}}
#   PGDATABASE   = ${{Postgres.PGDATABASE}}
#
# PORT is auto-provided by Railway.
spring:
  main:
    lazy-initialization: true
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 10000
      keepalive-time: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  address: 0.0.0.0
  port: ${PORT:8080}

# Same-origin: frontend is served from this service, so CORS is only needed for custom domains.
app:
  cors:
    origins: "*"
