# Railway deployment: single service (backend + static frontend).
# Activate with SPRING_PROFILES_ACTIVE=railway (set in Dockerfile).
#
# Railway PostgreSQL plugin auto-provides: PGHOST, PGPORT, PGUSER, PGPASSWORD, PGDATABASE.
# If using external DB (e.g. Neon), set SPRING_DATASOURCE_URL / USERNAME / PASSWORD instead.
# PORT is auto-provided by Railway.
spring:
  main:
    lazy-initialization: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:antidoomscroll}}
    username: ${SPRING_DATASOURCE_USERNAME:${PGUSER:antidoomscroll}}
    password: ${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 10000
      keepalive-time: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  address: 0.0.0.0
  port: ${PORT:8080}

# Same-origin: frontend is served from this service, so CORS is only needed for custom domains.
app:
  cors:
    origins: "*"
