# Production: Cloud Run + Neon PostgreSQL + Firebase Hosting.
# Only SPRING_DATASOURCE_PASSWORD must be set in Cloud Run (env or Secret Manager).
# Activate with SPRING_PROFILES_ACTIVE=prod (default in the Docker image).
#
# Lazy init: HTTP server listens immediately so Cloud Run passes the port check;
# DB and Flyway initialize on first use (avoids "failed to start and listen" on slow/cold start).
spring:
  main:
    lazy-initialization: true
  datasource:
    url: jdbc:postgresql://ep-old-heart-abyu622g-pooler.eu-west-2.aws.neon.tech/neondb?sslmode=require&channel_binding=require
    username: neondb_owner
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 10000
      keepalive-time: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Cloud Run: must listen on 0.0.0.0 and PORT (default 8080)
server:
  address: 0.0.0.0
  port: ${PORT:8080}

app:
  cors:
    origins: https://anti-domscroll.web.app,https://anti-domscroll.firebaseapp.com
