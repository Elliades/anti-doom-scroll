spring:
  datasource:
    # INIT: H2 does not have jsonb; define it so Hibernate columnDefinition = "jsonb" works with create-drop
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;INIT=CREATE DOMAIN IF NOT EXISTS JSONB AS TEXT
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  sql:
    init:
      mode: never

app:
  anonymous-profile-enabled: true
  ladder:
    defaultCode: default
    ladders:
      default:
        name: "Test Ladder"
        thresholds:
          minScoreToStay: 0.40
          minScoreToAdvance: 0.75
          answersNeededToAdvance: 5
        levels:
          - levelIndex: 0
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [default]
          - levelIndex: 1
            allowedDifficulties: [ULTRA_EASY, EASY]
            subjectCodes: [default]
          - levelIndex: 2
            allowedDifficulties: [EASY]
            subjectCodes: [default]
      sum:
        name: "Math Sum Ladder"
        thresholds:
          minScoreToStay: 0.40
          minScoreToAdvance: 0.75
          answersNeededToAdvance: 5
        levels:
          - levelIndex: 0
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [ADD]
          - levelIndex: 1
            allowedDifficulties: [ULTRA_EASY, EASY]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [ADD]
          - levelIndex: 2
            allowedDifficulties: [EASY]
            subjectCodes: [default]
            exerciseParamFilter:
              operation: [ADD, SUBTRACT]
      # Multi-subject combo: math + nback at the same level
      combo:
        name: "Math + N-Back Combo Ladder"
        thresholds:
          minScoreToStay: 0.40
          minScoreToAdvance: 0.75
          answersNeededToAdvance: 5
        levels:
          - levelIndex: 0
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [default, B1]
      # N-Back 35-level ladder (matches production — digit span MEMORY + B1; uses data.sql)
      # Phase 0 (L0-L4): DIGIT_SPAN / MEMORY
      # Phase 1 (L5-L14): card N-back … Phase 3 (L25-L34): dual N-back
      nback:
        name: "N-Back Ladder"
        thresholds:
          minScoreToStay: 0.40
          minScoreToAdvance: 0.75
          answersNeededToAdvance: 5
        levels:
          - levelIndex: 0
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [MEMORY]
            allowedTypes: [DIGIT_SPAN]
          - levelIndex: 1
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [MEMORY]
            allowedTypes: [DIGIT_SPAN]
          - levelIndex: 2
            allowedDifficulties: [EASY]
            subjectCodes: [MEMORY]
            allowedTypes: [DIGIT_SPAN]
          - levelIndex: 3
            allowedDifficulties: [MEDIUM]
            subjectCodes: [MEMORY]
            allowedTypes: [DIGIT_SPAN]
          - levelIndex: 4
            allowedDifficulties: [EASY, MEDIUM]
            subjectCodes: [MEMORY]
            allowedTypes: [DIGIT_SPAN]
          - levelIndex: 5
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [B1]
            allowedTypes: [N_BACK]
            exerciseParamFilter:
              n: ["1"]
              suitCount: ["1"]
          - levelIndex: 6
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [B1]
            allowedTypes: [N_BACK]
            exerciseParamFilter:
              n: ["1"]
              suitCount: ["2"]
          - levelIndex: 7
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [B1]
            allowedTypes: [N_BACK]
            exerciseParamFilter:
              n: ["1"]
              suitCount: ["3"]
          - levelIndex: 8
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [B1]
            allowedTypes: [N_BACK]
            exerciseParamFilter:
              n: ["1"]
              suitCount: ["4"]
          - levelIndex: 9
            allowedDifficulties: [EASY]
            subjectCodes: [B1]
            allowedTypes: [N_BACK]
            exerciseParamFilter:
              n: ["2"]
              suitCount: ["1"]
          - levelIndex: 10
            allowedDifficulties: [EASY]
            subjectCodes: [B1]
            allowedTypes: [N_BACK]
            exerciseParamFilter:
              n: ["2"]
              suitCount: ["2"]
          - levelIndex: 11
            allowedDifficulties: [EASY]
            subjectCodes: [B1]
            allowedTypes: [N_BACK]
            exerciseParamFilter:
              n: ["2"]
              suitCount: ["3"]
          - levelIndex: 12
            allowedDifficulties: [EASY]
            subjectCodes: [B1]
            allowedTypes: [N_BACK]
            exerciseParamFilter:
              n: ["2"]
              suitCount: ["4"]
          - levelIndex: 13
            allowedDifficulties: [MEDIUM]
            subjectCodes: [B1]
            allowedTypes: [N_BACK]
            exerciseParamFilter:
              n: ["3"]
              suitCount: ["2"]
          - levelIndex: 14
            allowedDifficulties: [MEDIUM]
            subjectCodes: [B1]
            allowedTypes: [N_BACK]
            exerciseParamFilter:
              n: ["3"]
              suitCount: ["4"]
          - levelIndex: 15
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [B1]
            allowedTypes: [N_BACK_GRID]
            exerciseParamFilter:
              n: ["1"]
              gridSize: ["3"]
          - levelIndex: 16
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [B1]
            allowedTypes: [N_BACK_GRID]
            exerciseParamFilter:
              n: ["1"]
              gridSize: ["4"]
          - levelIndex: 17
            allowedDifficulties: [EASY]
            subjectCodes: [B1]
            allowedTypes: [N_BACK_GRID]
            exerciseParamFilter:
              n: ["2"]
              gridSize: ["3"]
          - levelIndex: 18
            allowedDifficulties: [EASY]
            subjectCodes: [B1]
            allowedTypes: [N_BACK_GRID]
            exerciseParamFilter:
              n: ["2"]
              gridSize: ["4"]
          - levelIndex: 19
            allowedDifficulties: [MEDIUM]
            subjectCodes: [B1]
            allowedTypes: [N_BACK_GRID]
            exerciseParamFilter:
              n: ["3"]
              gridSize: ["3"]
          - levelIndex: 20
            allowedDifficulties: [MEDIUM]
            subjectCodes: [B1]
            allowedTypes: [N_BACK_GRID]
            exerciseParamFilter:
              n: ["3"]
              gridSize: ["4"]
          - levelIndex: 21
            allowedDifficulties: [EASY, MEDIUM]
            subjectCodes: [B1]
            allowedTypes: [N_BACK_GRID]
          - levelIndex: 22
            allowedDifficulties: [MEDIUM]
            subjectCodes: [B1]
            allowedTypes: [N_BACK, N_BACK_GRID]
            exerciseParamFilter:
              n: ["3"]
          - levelIndex: 23
            allowedDifficulties: [EASY, MEDIUM]
            subjectCodes: [B1]
            allowedTypes: [N_BACK, N_BACK_GRID]
          - levelIndex: 24
            allowedDifficulties: [MEDIUM]
            subjectCodes: [B1]
            allowedTypes: [N_BACK_GRID]
            exerciseParamFilter:
              n: ["3"]
              gridSize: ["4"]
          - levelIndex: 25
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [B1]
            allowedTypes: [DUAL_NBACK_CARD]
            exerciseParamFilter:
              n: ["1"]
          - levelIndex: 26
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [B1]
            allowedTypes: [DUAL_NBACK_GRID]
            exerciseParamFilter:
              n: ["1"]
          - levelIndex: 27
            allowedDifficulties: [EASY]
            subjectCodes: [B1]
            allowedTypes: [DUAL_NBACK_CARD, DUAL_NBACK_GRID]
            exerciseParamFilter:
              n: ["1"]
          - levelIndex: 28
            allowedDifficulties: [EASY]
            subjectCodes: [B1]
            allowedTypes: [DUAL_NBACK_CARD]
            exerciseParamFilter:
              n: ["2"]
          - levelIndex: 29
            allowedDifficulties: [EASY]
            subjectCodes: [B1]
            allowedTypes: [DUAL_NBACK_GRID]
            exerciseParamFilter:
              n: ["2"]
          - levelIndex: 30
            allowedDifficulties: [EASY, MEDIUM]
            subjectCodes: [B1]
            allowedTypes: [DUAL_NBACK_CARD, DUAL_NBACK_GRID]
            exerciseParamFilter:
              n: ["2"]
          - levelIndex: 31
            allowedDifficulties: [MEDIUM]
            subjectCodes: [B1]
            allowedTypes: [DUAL_NBACK_CARD]
            exerciseParamFilter:
              n: ["3"]
          - levelIndex: 32
            allowedDifficulties: [MEDIUM]
            subjectCodes: [B1]
            allowedTypes: [DUAL_NBACK_GRID]
            exerciseParamFilter:
              n: ["3"]
          - levelIndex: 33
            allowedDifficulties: [MEDIUM, HARD]
            subjectCodes: [B1]
            allowedTypes: [DUAL_NBACK_CARD, DUAL_NBACK_GRID]
            exerciseParamFilter:
              n: ["3"]
          - levelIndex: 34
            allowedDifficulties: [HARD]
            subjectCodes: [B1]
            allowedTypes: [DUAL_NBACK_CARD, DUAL_NBACK_GRID]
      # Pair ladder (test): 3 card-pair levels then 3 sum-pair levels
      pair:
        name: "Memory Pair Ladder"
        thresholds:
          minScoreToStay: 0.40
          minScoreToAdvance: 0.75
          answersNeededToAdvance: 5
        levels:
          # Phase 1: MEMORY_CARD_PAIRS
          - levelIndex: 0
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [MEMORY]
            allowedTypes: [MEMORY_CARD_PAIRS]
          - levelIndex: 1
            allowedDifficulties: [EASY]
            subjectCodes: [MEMORY]
            allowedTypes: [MEMORY_CARD_PAIRS]
          - levelIndex: 2
            allowedDifficulties: [MEDIUM]
            subjectCodes: [MEMORY]
            allowedTypes: [MEMORY_CARD_PAIRS]
          # Phase 2: SUM_PAIR
          - levelIndex: 3
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [MEMORY]
            allowedTypes: [SUM_PAIR]
          - levelIndex: 4
            allowedDifficulties: [EASY]
            subjectCodes: [MEMORY]
            allowedTypes: [SUM_PAIR]
          - levelIndex: 5
            allowedDifficulties: [HARD]
            subjectCodes: [MEMORY]
            allowedTypes: [SUM_PAIR]
      # Estimation ladder: 9 levels for test coverage (mirrors full 30-level phase structure)
      # Each phase and bridge is represented at least once.
      estimation:
        name: "Estimation Ladder"
        thresholds:
          minScoreToStay: 0.40
          minScoreToAdvance: 0.75
          answersNeededToAdvance: 5
        levels:
          - levelIndex: 0  # Phase 1: ULTRA_EASY
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [ESTIMATION]
          - levelIndex: 1  # Phase 1 continued
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [ESTIMATION]
          - levelIndex: 2  # Bridge 1→2
            allowedDifficulties: [ULTRA_EASY, EASY]
            subjectCodes: [ESTIMATION]
          - levelIndex: 3  # Phase 2: EASY
            allowedDifficulties: [EASY]
            subjectCodes: [ESTIMATION]
          - levelIndex: 4  # Bridge 2→3
            allowedDifficulties: [EASY, MEDIUM]
            subjectCodes: [ESTIMATION]
          - levelIndex: 5  # Phase 3: MEDIUM
            allowedDifficulties: [MEDIUM]
            subjectCodes: [ESTIMATION]
          - levelIndex: 6  # Bridge 3→4
            allowedDifficulties: [MEDIUM, HARD]
            subjectCodes: [ESTIMATION]
          - levelIndex: 7  # Phase 4: HARD
            allowedDifficulties: [HARD]
            subjectCodes: [ESTIMATION]
          - levelIndex: 8  # Phase 5: VERY_HARD
            allowedDifficulties: [VERY_HARD]
            subjectCodes: [ESTIMATION]
      # Anagram ladder: 5 levels for test coverage (mirrors full 30-level structure)
      anagram:
        name: "Anagram Ladder"
        thresholds:
          minScoreToStay: 0.40
          minScoreToAdvance: 0.75
          answersNeededToAdvance: 5
        levels:
          - levelIndex: 0
            allowedDifficulties: [ULTRA_EASY]
            subjectCodes: [WORD]
          - levelIndex: 1
            allowedDifficulties: [ULTRA_EASY, EASY]
            subjectCodes: [WORD]
          - levelIndex: 2
            allowedDifficulties: [EASY]
            subjectCodes: [WORD]
          - levelIndex: 3
            allowedDifficulties: [EASY, MEDIUM]
            subjectCodes: [WORD]
          - levelIndex: 4
            allowedDifficulties: [MEDIUM]
            subjectCodes: [WORD]
  journey:
    code: default
    name: "Test journey"
    steps:
      - stepIndex: 0
        type: OPEN_APP
        config:
          exerciseCount: 3
      - stepIndex: 1
        type: REFLECTION
        config:
          contentKey: why-doom-scrolling
      - stepIndex: 2
        type: CHAPTER_EXERCISES
        config:
          subjectCodes: [default, B1]
    content:
      why-doom-scrolling:
        title: "Why am I doom scrolling?"
        body: "Pause. Take a breath. When ready, continue."
