spring:
  datasource:
    # INIT: H2 does not have jsonb; define it so Hibernate columnDefinition = "jsonb" works with create-drop
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;INIT=CREATE DOMAIN IF NOT EXISTS JSONB AS TEXT
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  sql:
    init:
      mode: never

app:
  anonymous-profile-enabled: true
  ladder:
    defaultCode: default
    ladders:
      default:
        name: "Test Ladder"
        thresholds:
          minScoreToStay: 0.40
          minScoreToAdvance: 0.75
          answersNeededToAdvance: 5
        levels:
          - levelIndex: 0
            allowedDifficulties: [ULTRA_EASY]
            subjectCode: default
          - levelIndex: 1
            allowedDifficulties: [ULTRA_EASY, EASY]
            subjectCode: default
          - levelIndex: 2
            allowedDifficulties: [EASY]
            subjectCode: default
      sum:
        name: "Math Sum Ladder"
        thresholds:
          minScoreToStay: 0.40
          minScoreToAdvance: 0.75
          answersNeededToAdvance: 5
        levels:
          - levelIndex: 0
            allowedDifficulties: [ULTRA_EASY]
            subjectCode: default
            mathOperations: [ADD]
          - levelIndex: 1
            allowedDifficulties: [ULTRA_EASY, EASY]
            subjectCode: default
            mathOperations: [ADD]
          - levelIndex: 2
            allowedDifficulties: [EASY]
            subjectCode: default
            mathOperations: [ADD, SUBTRACT]
  journey:
    code: default
    name: "Test journey"
    steps:
      - stepIndex: 0
        type: OPEN_APP
        config:
          exerciseCount: 3
      - stepIndex: 1
        type: REFLECTION
        config:
          contentKey: why-doom-scrolling
      - stepIndex: 2
        type: CHAPTER_EXERCISES
        config:
          subjectCodes: [default, B1]
    content:
      why-doom-scrolling:
        title: "Why am I doom scrolling?"
        body: "Pause. Take a breath. When ready, continue."
